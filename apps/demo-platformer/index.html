<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@engine demo-platformer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
      /* --- NEXUS theme tokens (from design mockup, verbatim) --- */
      :root {
        --bg-darkest: #111111;
        --bg-panel: #1e1e1e;
        --bg-header: #252526;
        --bg-hover: #2d2d2d;
        --border-color: #303030;
        --accent: #0070e0;
        --text-main: #cccccc;
        --text-muted: #888888;
      }

      /* Custom Scrollbars for a premium feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #424242;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555555;
      }

      /* Viewport Grid Background */
      .viewport-grid {
        background-color: #141414;
        background-image:
          linear-gradient(#222 1px, transparent 1px),
          linear-gradient(90deg, #222 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center center;
      }

      /* Blueprint (node graph) background */
      .blueprint-grid {
        background-color: #141414;
        background-image: radial-gradient(#2a2a2a 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        background-position: center center;
      }

      /* Content Drawer Transition */
      #content-drawer {
        transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Utility for input fields */
      .engine-input {
        background-color: #000000;
        border: 1px solid var(--border-color);
        color: white;
        outline: none;
        transition: border-color 0.15s;
      }
      .engine-input:focus {
        border-color: var(--accent);
      }
      /* --- end NEXUS tokens --- */

      :root {
        color-scheme: dark;
      }
      html {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #09090b;
        color: #d4d4d8;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        overflow: hidden;
      }
      .app-shell {
        box-sizing: border-box;
        width: 100vw;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(82, 82, 91, 0.18), transparent 40%),
          linear-gradient(180deg, #18181b 0%, #09090b 100%);
      }
      .game-frame {
        width: min(calc(100vw - 48px), calc((100vh - 48px) * 16 / 9));
        aspect-ratio: 16 / 9;
        position: relative;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(39, 39, 42, 0.95), rgba(12, 12, 14, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .game-frame canvas {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        background: #141414;
      }
      @media (max-width: 640px) {
        .app-shell {
          padding: 12px;
        }
        .game-frame {
          width: min(calc(100vw - 24px), calc((100vh - 24px) * 16 / 9));
          border-radius: 12px;
        }
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
